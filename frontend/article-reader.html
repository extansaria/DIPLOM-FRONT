        document.getElementById("lead").textContent = post.lead;
        const heroImage = document.getElementById("hero-image");
        heroImage.src = post.image;
        heroImage.alt = post.title;
        document.getElementById("hero-caption").textContent = "";

        const root = document.getElementById("article-content");
        const sections = articleSections(postId, post);
        sections.forEach((section) => {
          const h2 = document.createElement("h2");
          h2.textContent = section.heading;
          root.appendChild(h2);
          section.paragraphs.forEach((txt) => {
            const p = document.createElement("p");
            p.textContent = txt;
            root.appendChild(p);
          });
          if (section.bullets?.length) {
            const ul = document.createElement("ul");
            section.bullets.forEach((item) => {
              const li = document.createElement("li");
              li.textContent = item;
              ul.appendChild(li);
            });
            root.appendChild(ul);
          }
        });

        const sourceNode = document.getElementById("source");
        const src = sourceLinks[postId];
        sourceNode.innerHTML = `Материал подготовлен редакцией GYDEX для внутреннего чтения на платформе. Источник: <a href="${src}" target="_blank" rel="noopener noreferrer">${src}</a>`;
      }

      const id = new URLSearchParams(window.location.search).get("id") || "blog-1";
      renderArticle(id);
    </script>
  </body>
</html>
