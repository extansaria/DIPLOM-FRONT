<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GYDEX — Интерактивный справочник упражнений</title>
    <style>
      :root {
        --bg: #f8fafc;
        --surface: #ffffff;
        --surface-2: #f1f5f9;
        --text: #0f172a;
        --muted: #64748b;
        --accent: #22c55e;
        --accent-soft: rgba(34, 197, 94, 0.18);
        --danger: #ef4444;
        --border: #cbd5e1;
        --shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
      }
      html, body, #root {
        min-height: 100%;
      }
      html, body {
        overflow-y: auto;
        overflow-x: hidden;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, Segoe UI, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      a { color: inherit; text-decoration: none; }
      .container { width: min(1200px, 92vw); margin: 0 auto; }
      .btn {
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        padding: 10px 16px;
        border-radius: 10px;
        cursor: pointer;
        transition: all .2s;
      }
      .btn:hover { transform: translateY(-1px); border-color: #94a3b8; }
      .btn.primary { background: var(--accent); border-color: var(--accent); color: #052e16; font-weight: 700; }
      .btn.ghost { background: transparent; }
      .chip {
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 8px 12px;
        color: var(--muted);
        cursor: pointer;
      }
      .chip.active { color: var(--text); border-color: var(--accent); background: var(--accent-soft); }
      header.site-header {
        position: sticky; top: 0; z-index: 10;
        backdrop-filter: blur(8px);
        background: rgba(255, 255, 255, 0.9);
        border-bottom: 1px solid var(--border);
      }
      .header-inner {
        display: flex; justify-content: space-between; align-items: center;
        padding: 12px 0;
      }
      .logo { font-size: 1.1rem; font-weight: 800; letter-spacing: .06em; line-height: 1; }
      .logo span { color: var(--accent); }
      nav { display: flex; gap: 8px; flex-wrap: wrap; }
      nav button {
        background: transparent; border: 0; color: var(--muted); cursor: pointer;
        padding: 8px 10px; border-radius: 8px; line-height: 1;
      }
      nav button.active, nav button:hover { color: var(--text); background: var(--surface); }
      .icon-btn {
        width: 24px; height: 18px; border-radius: 0;
        border: 0; background: transparent;
        color: var(--text); cursor: pointer;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .icon-btn img {
        width: auto;
        height: 100%;
        object-fit: contain;
        filter: grayscale(100%) brightness(0.72);
        opacity: 0.92;
        transition: filter .18s ease;
      }
      .icon-btn:hover img {
        filter: grayscale(100%) brightness(0.56);
        opacity: 1;
      }
      main { padding: 32px 0 64px; }
      .hero {
        display: block;
        margin-bottom: 16px;
      }
      .hero h1 { margin: 0 0 10px; font-size: clamp(1.8rem, 3vw, 2.8rem); }
      .hero p { margin: 0; color: var(--muted); max-width: 62ch; }
      .hero-actions { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
      .search-wrap {
        margin-top: 0;
        display: flex; gap: 10px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 8px;
        width: 100%;
      }
      .search-wrap input {
        flex: 1; border: 0; outline: 0; background: transparent; color: var(--text);
        font-size: .98rem; padding: 8px 8px 8px 0;
      }
      .search-input-wrap {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 8px;
        padding-left: 8px;
      }
      .search-input-icon {
        width: 16px;
        height: 16px;
        object-fit: contain;
        filter: grayscale(100%) brightness(0.7);
        opacity: 0.9;
      }
      .section-title { margin: 28px 0 14px; font-size: 1.35rem; }
      .card-grid { display: grid; gap: 14px; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px;
      }
      .card h3 { margin: 0 0 6px; font-size: 1.02rem; }
      .card p { margin: 0; color: var(--muted); font-size: .92rem; line-height: 1.45; }
      .card-footer { margin-top: 12px; display: flex; justify-content: space-between; gap: 8px; align-items: center; }
      .layout-two { display: grid; grid-template-columns: .95fr 1.05fr; gap: 20px; }
      .layout-two { align-items: start; }
      .muscle-board {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 16px;
      }
      .muscle-views { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .silhouette {
        position: relative;
        min-height: 520px;
        border-radius: 12px;
        border: 1px solid #cbd5e1;
        background: #eef2f7;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 8px;
      }
      .anatomy-figure {
        position: relative;
        width: 100%;
        max-width: 360px;
        height: 100%;
      }
      .figure-img {
        display: block;
        width: 100%;
        height: auto;
        max-height: 500px;
        object-fit: contain;
      }
      .tags { display: flex; gap: 8px; flex-wrap: wrap; }
      .modal-backdrop {
        position: fixed; inset: 0; background: rgba(15, 23, 42, .32);
        display: flex; align-items: center; justify-content: center;
        z-index: 40; padding: 16px;
      }
      .modal {
        width: min(860px, 100%);
        max-height: 92vh; overflow-y: auto;
        background: #ffffff;
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: var(--shadow);
      }
      .modal-header, .modal-body, .modal-footer { padding: 16px 18px; }
      .modal-header { border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
      .modal-footer { border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }
      .close-btn { border: 0; background: transparent; color: var(--muted); font-size: 1.1rem; cursor: pointer; }
      .preview-box {
        background: linear-gradient(140deg, #e2e8f0, #f8fafc);
        border: 1px dashed #94a3b8;
        border-radius: 12px;
        height: 190px;
        display: flex; align-items: center; justify-content: center;
        color: #334155;
      }
      .day-grid { display: grid; gap: 10px; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
      .day-col {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
      }
      .day-col h4 { margin: 0 0 10px; font-size: .95rem; color: #1e293b; }
      .day-item {
        margin-bottom: 8px;
        font-size: .9rem;
        padding: 8px;
        border-radius: 8px;
        background: #f8fafc;
        border: 1px solid #cbd5e1;
      }
      .form-grid { display: grid; gap: 10px; }
      .input, textarea {
        width: 100%;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: #ffffff;
        color: var(--text);
        padding: 10px 12px;
      }
      textarea { min-height: 90px; resize: vertical; }
      .muted { color: var(--muted); }
      .empty { color: var(--muted); font-size: .92rem; }
      .ai-fab {
        position: fixed;
        right: 18px;
        bottom: 18px;
        width: 58px;
        height: 58px;
        border-radius: 999px;
        border: 1px solid #cbd5e1;
        background: #ffffff;
        box-shadow: 0 10px 22px rgba(15, 23, 42, 0.18);
        cursor: pointer;
        z-index: 90;
        padding: 0;
        overflow: hidden;
        transition: transform .16s ease;
      }
      .ai-fab:hover {
        transform: scale(1.06);
      }
      .ai-fab img {
        position: absolute;
        left: 52%;
        top: 56%;
        width: 120%;
        height: 120%;
        object-fit: cover;
        object-position: center;
        transform: translate(-50%, -50%) scale(1.22);
        transform-origin: center;
      }
      .ai-chat-panel {
        position: fixed;
        right: 18px;
        bottom: 86px;
        width: min(340px, calc(100vw - 24px));
        height: 430px;
        border-radius: 14px;
        border: 1px solid #cbd5e1;
        background: #ffffff;
        box-shadow: 0 16px 34px rgba(15, 23, 42, 0.2);
        z-index: 90;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .ai-chat-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid #e2e8f0;
        padding: 10px 12px;
        background: #f8fafc;
      }
      .ai-chat-title {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #0f172a;
        font-weight: 600;
      }
      .ai-chat-title img {
        width: 24px;
        height: 24px;
        border-radius: 999px;
        object-fit: cover;
      }
      .ai-chat-close {
        border: 0;
        background: transparent;
        color: #64748b;
        cursor: pointer;
        font-size: 1rem;
      }
      .ai-chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 10px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        background: #ffffff;
      }
      .ai-msg {
        max-width: 86%;
        border-radius: 10px;
        padding: 8px 10px;
        font-size: .9rem;
        line-height: 1.4;
      }
      .ai-msg.ai {
        align-self: flex-start;
        background: #f1f5f9;
        color: #1e293b;
      }
      .ai-msg.user {
        align-self: flex-end;
        background: #dcfce7;
        color: #14532d;
      }
      .ai-chat-input-row {
        display: flex;
        gap: 8px;
        border-top: 1px solid #e2e8f0;
        padding: 10px;
        background: #f8fafc;
      }
      .ai-chat-input-row input {
        flex: 1;
        border: 1px solid #cbd5e1;
        border-radius: 9px;
        padding: 8px 10px;
        outline: none;
      }
      .ai-chat-input-row button {
        border: 1px solid #22c55e;
        background: #22c55e;
        color: #052e16;
        border-radius: 9px;
        padding: 8px 10px;
        cursor: pointer;
        font-weight: 600;
      }
      @media (max-width: 980px) {
        .hero, .layout-two { grid-template-columns: 1fr; }
        .muscle-views { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./bundle.js"></script>
  </body>
</html>
