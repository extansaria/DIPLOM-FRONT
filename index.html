<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
    <title>GYDEX — Интерактивный справочник упражнений</title>
    <style>
      @font-face {
        font-family: "Tactic Sans Extended";
        src: url("/frontend/src/assets/fonts/TacticSansExtended-Regular.otf") format("opentype");
        font-style: normal;
        font-weight: 400;
        font-display: swap;
      }
      @font-face {
        font-family: "Tactic Sans Extended";
        src: url("/frontend/src/assets/fonts/TacticSansExtended-Bold.otf") format("opentype");
        font-style: normal;
        font-weight: 700;
        font-display: swap;
      }
      @font-face {
        font-family: "dinpro_medium";
        src:
          local("DINPro-Medium"),
          local("DINPro Medium"),
          local("DIN Pro Medium"),
          local("dinpro_medium");
        font-style: normal;
        font-weight: 500;
        font-display: swap;
      }
      @font-face {
        font-family: "dinpro_light";
        src:
          local("DINPro-Light"),
          local("DINPro Light"),
          local("DIN Pro Light"),
          local("dinpro_light");
        font-style: normal;
        font-weight: 300;
        font-display: swap;
      }
      :root {
        --bg: #0b0d10;
        --surface: #11161c;
        --surface-2: #171d24;
        --text: #f3f4f6;
        --muted: #9aa3af;
        --accent: #ff6a00;
        --accent-soft: rgba(255, 106, 0, 0.16);
        --danger: #ef4444;
        --border: #2a313a;
        --shadow: 0 14px 34px rgba(0, 0, 0, 0.42);
        --modal-glass-fill: rgba(19, 23, 30, 0.46);
        --modal-glass-radial: radial-gradient(52% 58% at 50% 100%, rgba(42, 46, 54, 0.48) 0%, rgba(30, 34, 42, 0.76) 38%, rgba(22, 26, 32, 0.86) 72%, rgba(17, 20, 26, 0.94) 100%);
        --modal-glass-rim: inset 0 4px 6px 0 rgba(255, 255, 255, 0.07), inset 0 -2px 0 0 rgba(255, 255, 255, 0.09), inset 0 2px 0 0 rgba(255, 255, 255, 0.14), inset 0 -24px 42px 0 rgba(0, 0, 0, 0.28);
        --glass-card-bg: linear-gradient(160deg, rgba(52, 58, 72, 0.44) 0%, rgba(28, 31, 42, 0.62) 42%, rgba(14, 16, 22, 0.78) 100%);
        --glass-card-border: rgba(255, 255, 255, 0.1);
        --glass-card-shine: inset 0 1px 0 0 rgba(255, 255, 255, 0.17), inset 1px 0 0 0 rgba(255, 255, 255, 0.09);
        --glass-card-shade: inset 0 -1px 0 0 rgba(0, 0, 0, 0.38), inset -1px 0 0 0 rgba(0, 0, 0, 0.24);
        --header-col-gap: clamp(10px, 1.8vw, 18px);
        --header-radius: 16px;
        --footer-nav-columns-gap: clamp(120px, 16vw, 280px);
        --blog-grid-gap: 12px;
        --font-heading: "dinpro_medium", "Segoe UI", Arial, sans-serif;
        --font-body: "dinpro_light", "Segoe UI", Arial, sans-serif;
      }
      html, body, #root {
        min-height: 100%;
      }
      html, body {
        overflow-y: auto;
        overflow-x: hidden;
        scrollbar-gutter: stable;
        scroll-behavior: smooth;
      }
      @keyframes contentFadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes authBackdropIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes authModalIn {
        from { opacity: 0; transform: translateY(20px) scale(0.97); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }
      @keyframes authStepPasswordIn {
        from { opacity: 0; transform: translateY(16px) scale(0.985); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }
      .smooth-appear {
        will-change: opacity, transform;
      }
      .smooth-appear.is-entering {
        animation: contentFadeIn .24s ease both;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: var(--font-body);
        background:
          radial-gradient(1200px 520px at 52% -120px, rgba(255, 106, 0, 0.12), transparent 62%),
          var(--bg);
        color: var(--text);
        position: relative;
      }
      button { font-family: var(--font-heading); }
      input, textarea, select { font-family: var(--font-body); }
      h1, h2, h3, h4, h5, h6,
      .logo,
      .home-footer-logo,
      .section-title,
      .home-intro-title,
      .home-reco-title,
      .home-build-title,
      .blog-cat-section-title,
      .card h3,
      .blog-card-body h3 {
        font-family: var(--font-heading);
        letter-spacing: 0.01em;
      }
      button,
      .btn,
      a.btn,
      [role="button"],
      input[type="button"],
      input[type="submit"],
      input[type="reset"] {
        font-family: var(--font-body) !important;
      }
      button *,
      .btn *,
      [role="button"] * {
        font-family: inherit;
      }
      p,
      li,
      label,
      input,
      textarea,
      select,
      .muted,
      .empty {
        font-family: var(--font-body);
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: -1;
        background:
          linear-gradient(rgba(255, 255, 255, 0.055) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.055) 1px, transparent 1px);
        background-size: 46px 46px, 46px 46px;
        background-position: 0 0, 0 0;
        mask-image: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.85) 0%, rgba(0, 0, 0, 0.62) 52%, rgba(0, 0, 0, 0.12) 100%);
        -webkit-mask-image: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.85) 0%, rgba(0, 0, 0, 0.62) 52%, rgba(0, 0, 0, 0.12) 100%);
        opacity: 0.55;
      }
      a { color: inherit; text-decoration: none; }
      .container { width: min(1180px, 92vw); margin: 0 auto; }
      .ui-icon {
        display: inline-block;
        flex: 0 0 auto;
      }
      .btn {
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        padding: 10px 16px;
        border-radius: 10px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        transition: border-color .2s, background-color .2s, color .2s, transform .2s;
      }
      .btn:hover {
        transform: translateY(-1px);
        border-color: #3a4451;
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.25);
      }
      .btn.primary { background: #ff6a00; border-color: #ff7d20; color: #fff; font-weight: 700; }
      .btn.ghost { background: transparent; }
      .chip {
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 7px 11px;
        color: var(--muted);
        font-size: .9rem;
        font-weight: 400;
        cursor: pointer;
        position: relative;
        transition: border-color .2s, background-color .2s, color .2s, transform .2s;
      }
      .chip:hover { border-color: #3a4451; color: #d1d5db; transform: none; z-index: 2; }
      .chip.active { color: #fff; border-color: #ff7d20; background: var(--accent-soft); }
      header.site-header {
        position: sticky; top: 0; z-index: 10;
        background: transparent;
        border: 0;
      }
      header.site-header .container {
        width: min(1180px, 92vw);
      }
      .header-inner {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
        align-items: center;
        padding: 14px 0 10px;
        column-gap: var(--header-col-gap);
      }
      .logo {
        justify-self: start;
        margin-left: 0;
        font-size: 1.5rem;
        font-weight: 800;
        letter-spacing: .08em;
        line-height: 1;
        color: #e8edf5;
      }
      .logo span { color: var(--accent); }
      .header-main-nav {
        display: inline-flex;
        justify-self: center;
        max-width: min(1160px, 96vw);
        padding: 6px;
        border-radius: var(--header-radius);
        background: rgba(11, 13, 18, 0.88);
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.14),
          0 12px 26px rgba(0, 0, 0, 0.42);
      }
      .header-main-nav nav {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        justify-content: center;
        min-width: 0;
      }
      .header-main-nav nav button {
        background: transparent;
        border: 0;
        color: #c4cbd6;
        cursor: pointer;
        padding: 9px 14px;
        border-radius: 10px;
        line-height: 1;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        transition: background-color .18s ease, color .18s ease, box-shadow .18s ease;
      }
      .header-main-nav nav button.active {
        color: #fff;
        background: rgba(255, 106, 0, 0.95);
        border-radius: 10px;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.28),
          0 0 0 1px rgba(255, 130, 38, 0.58);
      }
      .header-main-nav nav button:hover {
        color: #fff;
        background: rgba(255, 255, 255, 0.12);
      }
      .header-main-nav nav button.active:hover {
        background: rgba(255, 106, 0, 0.95);
      }
      .nav-icon { opacity: 0.92; }
      .header-actions {
        justify-self: end;
        display: flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
      }
      .header-search {
        display: flex;
        align-items: center;
        min-width: 0;
      }
      .header-search .search-autocomplete-shell {
        width: auto;
      }
      .search-header-trigger {
        width: 40px;
        height: 40px;
        border-radius: var(--header-radius);
        border: 0;
        background: transparent;
        color: var(--text);
        cursor: pointer;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .search-header-trigger:hover {
        background: rgba(255, 255, 255, 0.12);
      }
      .icon-btn {
        width: 40px;
        height: 40px;
        border-radius: var(--header-radius);
        border: 0;
        background: transparent;
        color: var(--text);
        cursor: pointer;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .icon-btn:hover {
        background: rgba(255, 255, 255, 0.12);
      }
      main { padding: 42px 0 72px; }
      .hero {
        display: block;
        margin-bottom: 20px;
      }
      .home-intro {
        margin: 14px 0 42px;
        padding: 0 14px;
      }
      .home-portal-intro {
        margin: 24px 0 56px;
        padding: 0 6px;
        min-height: min(40vh, 420px);
      }
      .home-portal-kicker {
        margin: 0 0 18px;
        font-size: clamp(2rem, 4.4vw, 3.35rem);
        font-weight: 800;
        letter-spacing: .01em;
        line-height: 1.08;
        text-transform: uppercase;
        color: #f3f4f6;
      }
      .home-portal-kicker span {
        color: var(--accent);
        text-shadow:
          0 0 10px rgba(255, 106, 0, 0.55),
          0 0 22px rgba(255, 106, 0, 0.35);
      }
      .home-portal-title {
        margin: 0 0 40px;
        font-size: clamp(1.2rem, 2.2vw, 1.6rem);
        line-height: 1.28;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }
      .home-portal-title span {
        color: var(--accent);
      }
      .home-portal-lead {
        margin: 0 0 22px;
        color: #c7ced9;
        max-width: 120ch;
      }
      .home-portal-columns {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 22px;
        align-items: end;
        margin-top: 36px;
        margin-bottom: 58px;
      }
      .home-portal-col {
        min-height: 180px;
        padding: 6px 8px 10px 16px;
        border-left: 1px dotted rgba(255, 106, 0, 0.38);
        background: transparent;
      }
      .home-portal-col:nth-child(1) { min-height: 200px; }
      .home-portal-col:nth-child(2) { min-height: 250px; }
      .home-portal-col:nth-child(3) { min-height: 220px; }
      .home-portal-col:nth-child(4) { min-height: 275px; }
      .home-portal-col-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 42px;
        height: 42px;
        margin-bottom: 22px;
        border-radius: 10px;
        border: 1px solid rgba(255, 106, 0, 0.42);
        background: rgba(255, 106, 0, 0.14);
        color: #ff8a33;
        box-shadow: 0 0 0 1px rgba(255, 106, 0, 0.12), 0 0 18px rgba(255, 106, 0, 0.18);
        font-size: 1.16rem;
        line-height: 1;
      }
      .home-portal-col-title {
        margin: 0 0 12px;
        font-size: .94rem;
        font-weight: 700;
        line-height: 1.25;
        letter-spacing: 0.04em;
        color: #e8edf5;
      }
      .home-portal-col-text {
        margin: 0;
        font-size: .88rem;
        line-height: 1.55;
        color: #9fb0c5;
      }
      @media (max-width: 980px) {
        .home-portal-intro {
          min-height: auto;
          margin-bottom: 12px;
        }
        .home-portal-columns {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 26px;
        }
        .home-portal-col,
        .home-portal-col:nth-child(1),
        .home-portal-col:nth-child(2),
        .home-portal-col:nth-child(3),
        .home-portal-col:nth-child(4) {
          min-height: 190px;
        }
      }
      @media (max-width: 620px) {
        .home-portal-columns {
          grid-template-columns: 1fr;
        }
      }
      .home-intro-title {
        margin: 0 0 22px;
        font-size: clamp(2rem, 4.4vw, 3.35rem);
        font-weight: 800;
        letter-spacing: .01em;
        line-height: 1.08;
      }
      .home-intro-title span {
        color: var(--accent);
        text-shadow:
          0 0 10px rgba(255, 106, 0, 0.55),
          0 0 22px rgba(255, 106, 0, 0.35);
      }
      .home-intro-text {
        margin: 0 0 28px;
        color: #c7ced9;
        max-width: 78ch;
      }
      .hero h1 { margin: 0 0 20px; font-size: clamp(1.7rem, 2.8vw, 2.45rem); line-height: 1.08; text-shadow: 0 0 18px rgba(255, 106, 0, 0.18); }
      .hero p { margin: 0; color: var(--muted); max-width: 62ch; }
      .hero-actions { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
      .search-wrap {
        margin-top: 0;
        display: flex; gap: 10px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 8px;
        width: 100%;
        position: relative;
        z-index: 31;
      }
      .search-wrap-with-suggest {
        overflow: visible;
        display: flex;
        flex-direction: column;
        align-items: stretch;
      }
      .search-wrap-with-suggest.expanded {
        border-bottom-left-radius: 14px;
        border-bottom-right-radius: 14px;
        box-shadow: 0 16px 34px rgba(0, 0, 0, 0.5);
      }
      .search-row {
        display: flex;
        gap: 10px;
        width: 100%;
      }
      .search-wrap input {
        flex: 1; border: 0; outline: 0; background: transparent; color: var(--text);
        font-size: .98rem; padding: 8px 8px 8px 0;
      }
      .search-input-wrap {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 8px;
        padding-left: 8px;
      }
      .search-input-icon {
        color: #8b96a5;
        opacity: 0.95;
      }
      .search-autocomplete {
        position: relative;
        flex: 1;
      }
      .search-autocomplete input {
        width: 100%;
      }
      .search-autocomplete-shell {
        position: relative;
        z-index: 31;
      }
      .search-page-dim {
        position: fixed;
        inset: 0;
        border: 0;
        margin: 0;
        display: block;
        width: 100vw;
        height: 100vh;
        background: rgba(0, 0, 0, 0.9);
        z-index: 100000;
        cursor: default;
        backdrop-filter: blur(2px);
        opacity: 1;
        transition: opacity .22s ease;
      }
      .search-modal {
        position: fixed;
        inset: 0;
        z-index: 100001;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding-top: 16vh;
      }
      .search-modal.open {
        animation: searchPanelIn .22s ease both;
      }
      .search-modal.closing {
        animation: searchPanelOut .22s ease both;
      }
      .search-modal-panel {
        width: min(980px, 94vw);
        position: relative;
      }
      .search-modal-row {
        display: flex;
        gap: 10px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 10px;
        box-shadow: 0 16px 34px rgba(0, 0, 0, 0.5);
      }
      .search-modal-row .search-input-wrap {
        padding: 0 8px;
      }
      .search-modal-row .search-input-icon {
        color: #9fb0c2;
      }
      .search-modal-row input {
        border: 0;
        outline: 0;
        background: transparent;
        color: var(--text);
        font-size: 1rem;
        padding: 10px 0;
      }
      .search-suggest-popover-modal {
        position: static;
        margin-top: 8px;
      }
      @keyframes searchDimIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes searchPanelIn {
        from { opacity: 0; transform: translateY(-10px) scale(0.98); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }
      @keyframes searchPanelOut {
        from { opacity: 1; transform: translateY(0) scale(1); }
        to { opacity: 0; transform: translateY(-10px) scale(0.98); }
      }
      .search-suggest-list {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--surface);
        box-shadow: var(--shadow);
        z-index: 31;
        max-height: 260px;
        overflow-y: auto;
      }
      .search-suggest-list.expanded {
        border-radius: 10px;
      }
      .search-suggest-popover {
        position: absolute;
        left: 0;
        right: 0;
        top: calc(100% + 8px);
        z-index: 31;
      }
      .search-suggest-item {
        width: 100%;
        text-align: left;
        border: 0;
        background: transparent;
        color: var(--text);
        padding: 10px 12px;
        display: flex;
        justify-content: space-between;
        gap: 8px;
        cursor: pointer;
      }
      .search-suggest-item:hover { background: #1b222b; }
      .search-suggest-item .muted { color: var(--text); }
      .section-title {
        margin: 40px 0 24px;
        font-size: clamp(1.2rem, 2.2vw, 1.6rem);
        line-height: 1.28;
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }
      .container > .section-title:first-child,
      .container > .blog-page:first-child,
      .container > .catalog-muscle-frame:first-child,
      .container > .home-portal-intro:first-child {
        margin-top: 0;
      }
      .card-grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); }
      .card {
        position: relative;
        border-radius: 20px;
        padding: 14px 14px 16px;
        background: var(--glass-card-bg);
        backdrop-filter: saturate(150%) blur(22px);
        -webkit-backdrop-filter: saturate(150%) blur(22px);
        border: 1px solid var(--glass-card-border);
        box-shadow:
          var(--glass-card-shine),
          var(--glass-card-shade),
          0 10px 32px rgba(0, 0, 0, 0.4);
        transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
      }
      .catalog-card {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .catalog-grid.card-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        align-items: stretch;
      }
      @media (max-width: 1100px) {
        .catalog-grid.card-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
      @media (max-width: 760px) {
        .catalog-grid.card-grid {
          grid-template-columns: 1fr;
        }
      }
      .catalog-item-card {
        height: 386px;
        min-height: 386px;
        box-sizing: border-box;
      }
      .catalog-item-card .exercise-preview-zone {
        order: -1;
        height: 162px;
        min-height: 162px;
        max-height: 162px;
        margin-top: 0;
        margin-bottom: 10px;
        flex-shrink: 0;
        flex-grow: 0;
      }
      .catalog-item-card .catalog-card-desc {
        flex: 1 1 auto;
        min-height: 0;
        overflow: hidden;
        overscroll-behavior: contain;
        margin: 0;
        padding-right: 0;
        scrollbar-gutter: stable;
      }
      .catalog-item-card .catalog-card-desc p {
        margin: 0;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
        line-clamp: 2;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .catalog-item-card .card-footer {
        margin-top: auto;
        flex-shrink: 0;
        padding-top: 4px;
      }
      .catalog-muscle-label {
        margin: -2px 0 0;
        color: #b5bfcc;
        font-size: .95rem;
      }
      .card:hover {
        border-color: rgba(255, 255, 255, 0.16);
        transform: translateY(-3px);
        box-shadow:
          inset 0 1px 0 0 rgba(255, 255, 255, 0.22),
          inset 1px 0 0 0 rgba(255, 255, 255, 0.12),
          inset 0 -1px 0 0 rgba(0, 0, 0, 0.42),
          inset -1px 0 0 0 rgba(0, 0, 0, 0.3),
          0 16px 42px rgba(0, 0, 0, 0.48),
          0 0 0 1px rgba(255, 106, 0, 0.22),
          0 0 22px rgba(255, 106, 0, 0.28);
